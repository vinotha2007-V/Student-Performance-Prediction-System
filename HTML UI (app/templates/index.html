<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
</head>
<body>
    <h2>Student Performance Prediction</h2>
    <form action="/predict" method="post">
        <input type="text" name="hours" placeholder="Hours Studied" required><br>
        <input type="text" name="attendance" placeholder="Attendance %" required><br>
        <input type="text" name="previous" placeholder="Previous Score" required><br>
        <input type="text" name="assignments" placeholder="Assignments Completed" required><br>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</body>
</html>
